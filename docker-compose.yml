services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: stock_analysis_qdrant
    restart: on-failure
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo ok && exec 3>&-' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: stock_analysis_ollama
    restart: on-failure
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU passthrough — bỏ comment nếu server có NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_analysis_backend
    restart: on-failure
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/stockdb
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BROKER_URL=kafka:9092
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      # Cache HuggingFace models vào volume — tải 1 lần duy nhất
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    volumes:
      - hf_model_cache:/app/.cache/huggingface
    dns_opt:
      - timeout:10
      - attempts:3
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_analysis_worker
    restart: on-failure
    command: python -m app.worker
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/stockdb
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BROKER_URL=kafka:9092
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    volumes:
      - hf_model_cache:/app/.cache/huggingface
    dns_opt:
      - timeout:10
      - attempts:3
    depends_on:
      backend:
        condition: service_started
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock_analysis_frontend
    ports:
      - "80:80"
    dns_opt:
      - timeout:10
      - attempts:3
    depends_on:
      - backend

  mongo:
    image: mongo:6.0
    container_name: stock_analysis_mongo
    command: [ "mongod", "--quiet", "--setParameter", "logComponentVerbosity={verbosity: 0, storage: {verbosity: 0}}" ]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: stock_analysis_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: stock_analysis_zookeeper
    restart: on-failure
    # Port 2181 chỉ mở nội bộ Docker network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: stock_analysis_kafka
    restart: on-failure
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.coordinator.group.GroupCoordinator=WARN,org.apache.kafka=WARN,org.apache.zookeeper=WARN,state.change.logger=WARN"
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - zookeeper

volumes:
  mongo_data:
  redis_data:
  hf_model_cache:
  qdrant_data:
  ollama_models:
